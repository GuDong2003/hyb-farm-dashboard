name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create Wrangler config
        env:
          CLOUDFLARE_D1_DATABASE_NAME: ${{ secrets.CLOUDFLARE_D1_DATABASE_NAME }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const required = ['CLOUDFLARE_D1_DATABASE_NAME', 'CLOUDFLARE_D1_DATABASE_ID'];
          for (const key of required) {
            if (!process.env[key]) throw new Error(`${key} is required`);
          }
          const config = fs.readFileSync('wrangler.example.toml', 'utf8')
            .replace('REPLACE_WITH_D1_DATABASE_NAME', process.env.CLOUDFLARE_D1_DATABASE_NAME)
            .replace('REPLACE_WITH_D1_DATABASE_ID', process.env.CLOUDFLARE_D1_DATABASE_ID);
          fs.writeFileSync('wrangler.toml', config);
          NODE

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
