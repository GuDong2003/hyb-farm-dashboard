<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HYB Farm Dashboard</title>
    <meta name="description" content="Privacy-first HYB farm dashboard for market, profit, experience, and leaderboard analysis." />
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: #111827;
        background: #f8fafc;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #f8fafc; }
      main { max-width: 980px; margin: 0 auto; padding: 48px 20px; }
      h1 { margin: 0 0 12px; font-size: clamp(28px, 5vw, 44px); line-height: 1.08; letter-spacing: 0; }
      p { margin: 0; color: #475569; line-height: 1.75; }
      .panel { margin-top: 28px; border: 1px solid #dbe3ee; border-radius: 8px; background: #fff; overflow: hidden; }
      .row { display: grid; grid-template-columns: 170px minmax(0, 1fr); gap: 16px; padding: 16px 18px; border-top: 1px solid #eef2f7; }
      .row:first-child { border-top: 0; }
      .label { font-weight: 800; color: #0f172a; }
      code { padding: 2px 5px; border-radius: 5px; background: #eef2ff; color: #3730a3; }
      .ok { color: #047857; font-weight: 800; }
      @media (max-width: 640px) {
        main { padding: 32px 14px; }
        .row { grid-template-columns: 1fr; gap: 6px; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HYB Farm Dashboard</h1>
      <p>隐私优先的黑与白农场数据分析面板。市场收益、作物经验、排行榜分析会逐步放到这里。</p>
      <section class="panel" aria-label="部署状态">
        <div class="row">
          <div class="label">部署状态</div>
          <div class="ok">Worker Static Assets 已就绪</div>
        </div>
        <div class="row">
          <div class="label">隐私模式</div>
          <div>默认不上传用户农场数据；后续通过 <code>#snapshot</code> 导入到用户自己的浏览器 IndexedDB。</div>
        </div>
        <div class="row">
          <div class="label">下一步</div>
          <div>实现设置页、bookmarklet 生成器、收益排行、经验排行和历史记录。</div>
        </div>
      </section>
    </main>
  </body>
</html>
